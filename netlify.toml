[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled Functions — Daily sync jobs
[functions."sync-zelty-ca-daily"]
  schedule = "0 6 * * *"

[functions."sync-zelty-products"]
  schedule = "0 6 * * *"

[functions."check-alerts"]
  schedule = "0 8 * * *"
